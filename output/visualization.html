<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Maze Visualization</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f6f7fb; color: #1f2937; }
    .page { max-width: 1180px; margin: 28px auto; padding: 0 24px; }
    h1 { margin: 0 0 18px; font-size: 28px; }
    .layout { display: flex; align-items: flex-start; gap: 24px; }
    .maze { display: grid; gap: 3px; width: max-content; padding: 16px; background: #ffffff; border: 1px solid #d7dce5; }
    .cell { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; box-sizing: border-box; }
    .wall { background: #111827; color: #111827; }
    .road { background: #ffffff; border: 1px solid #e5e7eb; }
    .start { background: #2563eb; color: #ffffff; }
    .end { background: #16a34a; color: #ffffff; }
    .gold { background: #facc15; color: #713f12; }
    .trap { background: #ef4444; color: #ffffff; }
    .boss { background: #7c3aed; color: #ffffff; }
    .path { box-shadow: inset 0 0 0 4px #38bdf8; }
    .road.path { background: #bae6fd; }
    .current { outline: 4px solid #f97316; outline-offset: -4px; }
    .panel { width: 300px; padding: 16px; background: #ffffff; border: 1px solid #d7dce5; }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .stat { padding: 10px; background: #f8fafc; border: 1px solid #e5e7eb; }
    .label { display: block; margin-bottom: 4px; color: #64748b; font-size: 12px; }
    .value { font-size: 18px; font-weight: 700; }
    .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 12px 0; }
    button { height: 34px; border: 1px solid #cbd5e1; background: #ffffff; color: #0f172a; font-weight: 700; cursor: pointer; }
    button:hover { background: #f1f5f9; }
    input[type=range] { width: 100%; }
    .line { margin: 10px 0; font-size: 14px; }
    .events { min-height: 44px; padding: 10px; background: #f8fafc; border: 1px solid #e5e7eb; font-size: 13px; line-height: 1.5; }
    .legend { display: flex; flex-wrap: wrap; gap: 10px 18px; margin-top: 18px; }
    .legend-item { display: inline-flex; align-items: center; gap: 6px; font-size: 14px; }
    .legend-swatch { width: 18px; height: 18px; border: 1px solid #d1d5db; box-sizing: border-box; }
  </style>
</head>

          <span class="legend-item"><span class="legend-swatch road path"></span>Path</span>
        </div>
      </section>
      <aside class="panel">
        <div class="stats">

          <div class="stat"><span class="label">Position</span><span id="positionValue" class="value">(0,0)</span></div>
          <div class="stat"><span class="label">Status</span><span class="value">WIN</span></div>

        <input id="stepRange" type="range" min="0" value="0">
        <div class="controls">

        <div class="line"><strong>Events:</strong></div>
        <div id="eventsValue" class="events">START</div>
        <div class="line"><strong>Final:</strong> coins 240, steps 108, ratio 2.22222</div>

    </div>
  </main>

      if (cell === 'G') return 'gold';
      if (cell === 'T') return 'trap';
      if (cell === 'B') return 'boss';

    }
    function textForCell(cell) { return cell === ' ' ? '' : cell; }
    function key(position) { return position[0] + ',' + position[1]; }
    function stopPlayback() {
      if (timer !== null) { clearInterval(timer); timer = null; }
      playBtn.textContent = 'Play';
    }
    function render() {
      const step = steps[currentIndex];
      const visited = new Set();
      for (let i = 0; i <= currentIndex; ++i) visited.add(key(steps[i].position));
      mazeEl.innerHTML = '';
      mazeEl.style.gridTemplateColumns = `repeat(${columnCount}, 32px)`;
      for (let row = 0; row < maze.length; ++row) {
        for (let column = 0; column < columnCount; ++column) {
          const cell = maze[row][column] || '#';
          const pos = [row, column];
          const div = document.createElement('div');
          div.className = 'cell ' + classForCell(cell)
            + (visited.has(key(pos)) ? ' path' : '')
            + (key(pos) === key(step.position) ? ' current' : '');
          div.textContent = textForCell(cell);
          mazeEl.appendChild(div);
        }
      }
      document.getElementById('stepValue').textContent = step.step;
      document.getElementById('coinValue').textContent = step.coins;
      document.getElementById('positionValue').textContent = '(' + step.position[0] + ',' + step.position[1] + ')';
      document.getElementById('actionValue').textContent = step.action;
      document.getElementById('eventsValue').textContent = step.events.length ? step.events.join(', ') : 'NONE';
      rangeEl.value = currentIndex;
    }
    function goTo(index) {
      currentIndex = Math.max(0, Math.min(index, steps.length - 1));
      render();
    }
    document.getElementById('prevBtn').addEventListener('click', () => { stopPlayback(); goTo(currentIndex - 1); });
    document.getElementById('nextBtn').addEventListener('click', () => { stopPlayback(); goTo(currentIndex + 1); });
    playBtn.addEventListener('click', () => {
      if (timer !== null) { stopPlayback(); return; }
      playBtn.textContent = 'Pause';
      timer = setInterval(() => {
        if (currentIndex >= steps.length - 1) { stopPlayback(); return; }
        goTo(currentIndex + 1);
      }, 220);
    });
    rangeEl.max = steps.length - 1;
    rangeEl.addEventListener('input', () => { stopPlayback(); goTo(Number(rangeEl.value)); });
    render();

</html>
