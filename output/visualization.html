<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Maze Visualization</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f6f7fb; color: #1f2937; }
    .page { max-width: 1180px; margin: 28px auto; padding: 0 24px; }
    h1 { margin: 0 0 18px; font-size: 28px; }
    .runner { display: grid; grid-template-columns: minmax(160px, 1fr) 150px 110px minmax(160px, 1.4fr); gap: 10px; align-items: center; margin: 0 0 18px; }
    select { height: 36px; border: 1px solid #cbd5e1; background: #ffffff; color: #0f172a; padding: 0 10px; font-weight: 700; }
    .run-status { color: #475569; font-size: 14px; min-height: 20px; }
    .layout { display: flex; align-items: flex-start; gap: 24px; }
    .maze { display: grid; gap: 3px; width: max-content; padding: 16px; background: #ffffff; border: 1px solid #d7dce5; }
    .cell { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; box-sizing: border-box; }
    .wall { background: #111827; color: #111827; }
    .road { background: #ffffff; border: 1px solid #e5e7eb; }
    .start { background: #2563eb; color: #ffffff; }
    .end { background: #16a34a; color: #ffffff; }
    .gold { background: #facc15; color: #713f12; }
    .trap { background: #ef4444; color: #ffffff; }
    .boss { background: #7c3aed; color: #ffffff; }
    .path { box-shadow: inset 0 0 0 4px #38bdf8; }
    .road.path { background: #bae6fd; }
    .current { outline: 4px solid #f97316; outline-offset: -4px; }
    .panel { width: 300px; padding: 16px; background: #ffffff; border: 1px solid #d7dce5; }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .stat { padding: 10px; background: #f8fafc; border: 1px solid #e5e7eb; }
    .label { display: block; margin-bottom: 4px; color: #64748b; font-size: 12px; }
    .value { font-size: 18px; font-weight: 700; }
    .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 12px 0; }
    button { height: 34px; border: 1px solid #cbd5e1; background: #ffffff; color: #0f172a; font-weight: 700; cursor: pointer; }
    button:hover { background: #f1f5f9; }
    input[type=range] { width: 100%; }
    .line { margin: 10px 0; font-size: 14px; }
    .events { min-height: 44px; padding: 10px; background: #f8fafc; border: 1px solid #e5e7eb; font-size: 13px; line-height: 1.5; }
    .legend { display: flex; flex-wrap: wrap; gap: 10px 18px; margin-top: 18px; }
    .legend-item { display: inline-flex; align-items: center; gap: 6px; font-size: 14px; }
    .legend-swatch { width: 18px; height: 18px; border: 1px solid #d1d5db; box-sizing: border-box; }
  </style>
</head>
<body>
  <main class="page">
    <h1>Maze Visualization</h1>
    <div class="runner">
      <select id="mapSelect"></select>
      <select id="algorithmSelect">
        <option value="greedy">greedy</option>
        <option value="divide">divide</option>
        <option value="astar">astar</option>
        <option value="dijkstra">dijkstra</option>
        <option value="bfs">bfs</option>
      </select>
      <button id="runBtn">Run</button>
      <span id="runStatus" class="run-status"></span>
    </div>
    <div class="layout">
      <section>
        <div id="maze" class="maze"></div>
        <div class="legend">
          <span class="legend-item"><span class="legend-swatch start"></span>Start</span>
          <span class="legend-item"><span class="legend-swatch end"></span>End</span>
          <span class="legend-item"><span class="legend-swatch wall"></span>Wall</span>
          <span class="legend-item"><span class="legend-swatch road"></span>Road</span>
          <span class="legend-item"><span class="legend-swatch gold"></span>Gold</span>
          <span class="legend-item"><span class="legend-swatch trap"></span>Trap</span>
          <span class="legend-item"><span class="legend-swatch boss"></span>Boss</span>
          <span class="legend-item"><span class="legend-swatch road path"></span>Path</span>
        </div>
      </section>
      <aside class="panel">
        <div class="stats">
          <div class="stat"><span class="label">Step</span><span id="stepValue" class="value">0</span></div>
          <div class="stat"><span class="label">Coins</span><span id="coinValue" class="value">0</span></div>
          <div class="stat"><span class="label">Position</span><span id="positionValue" class="value">(0,0)</span></div>
          <div class="stat"><span class="label">Status</span><span class="value">WIN</span></div>
        </div>
        <input id="stepRange" type="range" min="0" value="0">
        <div class="controls">
          <button id="prevBtn">Prev</button>
          <button id="playBtn">Play</button>
          <button id="nextBtn">Next</button>
        </div>
        <div class="line"><strong>Action:</strong> <span id="actionValue">START</span></div>
        <div class="line"><strong>Events:</strong></div>
        <div id="eventsValue" class="events">START</div>
        <div class="line"><strong>Final:</strong> coins 150, steps 4, ratio 37.5</div>
      </aside>
    </div>
  </main>
  <script>
    const columnCount = 3;
    const maze = [
      ["S","G","T"],
      [" ","G"," "],
      ["T"," ","G"]
    ];
    const steps = [
      {step:0, position:[0,0], coins:0, action:"START", events:["START"]},
      {step:1, position:[0,1], coins:50, action:"MOVE(RIGHT)", events:["MOVE_SUCCESS","PICK_GOLD"]},
      {step:2, position:[1,1], coins:100, action:"MOVE(DOWN)", events:["MOVE_SUCCESS","PICK_GOLD"]},
      {step:3, position:[1,2], coins:100, action:"MOVE(RIGHT)", events:["MOVE_SUCCESS"]},
      {step:4, position:[2,2], coins:150, action:"MOVE(DOWN)", events:["MOVE_SUCCESS","PICK_GOLD"]},
      {step:5, position:[2,2], coins:150, action:"NONE", events:["GAME_WIN"]}
    ];
    let currentIndex = 0;
    let timer = null;
    const mazeEl = document.getElementById('maze');
    const rangeEl = document.getElementById('stepRange');
    const playBtn = document.getElementById('playBtn');
    const mapSelect = document.getElementById('mapSelect');
    const algorithmSelect = document.getElementById('algorithmSelect');
    const runBtn = document.getElementById('runBtn');
    const runStatus = document.getElementById('runStatus');
    const selectionStorageKey = 'maze-visualizer-selection';
    function classForCell(cell) {
      if (cell === '#') return 'wall';
      if (cell === 'S') return 'start';
      if (cell === 'E') return 'end';
      if (cell === 'G') return 'gold';
      if (cell === 'T') return 'trap';
      if (cell === 'B') return 'boss';
      return 'road';
    }
    function textForCell(cell) { return cell === ' ' ? '' : cell; }
    function key(position) { return position[0] + ',' + position[1]; }
    function stopPlayback() {
      if (timer !== null) { clearInterval(timer); timer = null; }
      playBtn.textContent = 'Play';
    }
    function render() {
      const step = steps[currentIndex];
      const visited = new Set();
      for (let i = 0; i <= currentIndex; ++i) visited.add(key(steps[i].position));
      mazeEl.innerHTML = '';
      mazeEl.style.gridTemplateColumns = `repeat(${columnCount}, 32px)`;
      for (let row = 0; row < maze.length; ++row) {
        for (let column = 0; column < columnCount; ++column) {
          const cell = maze[row][column] || '#';
          const pos = [row, column];
          const div = document.createElement('div');
          div.className = 'cell ' + classForCell(cell)
            + (visited.has(key(pos)) ? ' path' : '')
            + (key(pos) === key(step.position) ? ' current' : '');
          div.textContent = textForCell(cell);
          mazeEl.appendChild(div);
        }
      }
      document.getElementById('stepValue').textContent = step.step;
      document.getElementById('coinValue').textContent = step.coins;
      document.getElementById('positionValue').textContent = '(' + step.position[0] + ',' + step.position[1] + ')';
      document.getElementById('actionValue').textContent = step.action;
      document.getElementById('eventsValue').textContent = step.events.length ? step.events.join(', ') : 'NONE';
      rangeEl.value = currentIndex;
    }
    function goTo(index) {
      currentIndex = Math.max(0, Math.min(index, steps.length - 1));
      render();
    }
    function savedSelection() {
      try { return JSON.parse(localStorage.getItem(selectionStorageKey)) || {}; }
      catch (_) { return {}; }
    }
    function saveSelection() {
      localStorage.setItem(selectionStorageKey, JSON.stringify({
        map: mapSelect.value,
        algorithm: algorithmSelect.value
      }));
    }
    function restoreAlgorithm() {
      const saved = savedSelection();
      if (saved.algorithm) algorithmSelect.value = saved.algorithm;
    }
    async function loadMaps() {
      try {
        const response = await fetch('/api/maps');
        if (!response.ok) return;
        const data = await response.json();
        const saved = savedSelection();
        mapSelect.innerHTML = '';
        for (const map of data.maps) {
          const option = document.createElement('option');
          option.value = map;
          option.textContent = map;
          mapSelect.appendChild(option);
        }
        if (saved.map && data.maps.includes(saved.map)) mapSelect.value = saved.map;
      } catch (_) {}
    }
    async function runSelected() {
      stopPlayback();
      saveSelection();
      runBtn.disabled = true;
      runStatus.textContent = 'Running...';
      try {
        const response = await fetch('/api/run', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({map: mapSelect.value, algorithm: algorithmSelect.value})
        });
        const data = await response.json();
        if (!response.ok || !data.ok) throw new Error(data.error || 'Run failed');
        runStatus.textContent = 'Done';
        window.location.reload();
      } catch (error) {
        runStatus.textContent = error.message;
        runBtn.disabled = false;
      }
    }
    document.getElementById('prevBtn').addEventListener('click', () => { stopPlayback(); goTo(currentIndex - 1); });
    document.getElementById('nextBtn').addEventListener('click', () => { stopPlayback(); goTo(currentIndex + 1); });
    mapSelect.addEventListener('change', saveSelection);
    algorithmSelect.addEventListener('change', saveSelection);
    runBtn.addEventListener('click', runSelected);
    playBtn.addEventListener('click', () => {
      if (timer !== null) { stopPlayback(); return; }
      playBtn.textContent = 'Pause';
      timer = setInterval(() => {
        if (currentIndex >= steps.length - 1) { stopPlayback(); return; }
        goTo(currentIndex + 1);
      }, 220);
    });
    rangeEl.max = steps.length - 1;
    rangeEl.addEventListener('input', () => { stopPlayback(); goTo(Number(rangeEl.value)); });
    restoreAlgorithm();
    loadMaps();
    render();
  </script>
</body>
</html>
